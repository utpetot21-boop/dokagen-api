# =============================================================================
# DokaGen — Nginx Reverse Proxy Config
# Simpan ke: /etc/nginx/sites-available/dokagen-api
# Aktifkan : ln -s /etc/nginx/sites-available/dokagen-api /etc/nginx/sites-enabled/
# =============================================================================

# Rate limiting — cegah abuse API
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 80;
    listen [::]:80;

    # Ganti dengan domain Anda, contoh: api.dokagen.id
    server_name api.dokagen.id;

    # Redirect HTTP → HTTPS (aktifkan setelah SSL terpasang)
    # return 301 https://$host$request_uri;

    # ── Upload file besar (PDF, gambar scan) ─────────────────────────────────
    client_max_body_size 50M;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1024;

    # ── Proxy ke Node.js ─────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout untuk Puppeteer generate PDF (bisa lama)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Static files: uploads (PDF, logo, tanda tangan) ──────────────────────
    location /uploads/ {
        alias /var/www/dokagen-api/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;

        # Batasi akses hanya file PDF, JPG, PNG
        location ~* \.(pdf|jpg|jpeg|png|webp)$ {
            try_files $uri =404;
        }
        return 403;
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3001/health;
        access_log off;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}

